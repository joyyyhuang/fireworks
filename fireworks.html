<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>烟花小程序</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at bottom, #0b132b, #02040a 70%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .tip {
      position: fixed;
      left: 12px;
      bottom: 10px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      letter-spacing: 0.3px;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="tip">点击/拖动屏幕放烟花（首次交互后会播放背景音乐）</div>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    let width = 0;
    let height = 0;
    let dpr = 1;

    function resize() {
      dpr = Math.max(1, window.devicePixelRatio || 1);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    class Particle {
      constructor(x, y, vx, vy, color, options = {}) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.life = 1;
        this.decay = options.decay ?? (0.008 + Math.random() * 0.015);
        this.size = options.size ?? (1.5 + Math.random() * 2.4);
        this.color = color;
        this.gravity = options.gravity ?? (0.05 + Math.random() * 0.05);
        this.friction = options.friction ?? 0.99;
      }

      update() {
        this.vx *= this.friction;
        this.vy = this.vy * this.friction + this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }

      draw() {
        if (this.life <= 0) return;
        ctx.globalAlpha = this.life;
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class Rocket {
      constructor(targetX, targetY, payload = {}) {
        this.x = width * (0.15 + Math.random() * 0.7);
        this.y = height + 10;
        this.targetX = targetX;
        this.targetY = targetY;
        this.speed = 5 + Math.random() * 2;
        this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
        this.payloadType = payload.type || "normal";
        this.payloadText = payload.text || "";
        this.done = false;
      }

      update() {
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const dist = Math.hypot(dx, dy);

        if (dist < this.speed || this.y < this.targetY) {
          this.done = true;
          if (this.payloadType === "shape") {
            explodeShape(this.targetX, this.targetY, this.payloadText, this.color);
          } else {
            explode(this.targetX, this.targetY, this.color);
          }
          return;
        }

        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
      }

      draw() {
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
        ctx.fill();
        // 添加光晕效果
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const rockets = [];
    const particles = [];
    let clickShapeIndex = 0;
    const clickShapes = ["新年快乐！！！", "祝大家", "长生不老", "永远不死～～～"];

    let bgmAudio = null;
    let bgmStarted = false;

    async function startBgm() {
      if (bgmStarted) return;
      if (!bgmAudio) {
        bgmAudio = new Audio("./陶喆 - 就是爱你.mp3");
        bgmAudio.loop = true;
        bgmAudio.volume = 0.5;
        bgmAudio.preload = "auto";
      }
      try {
        await bgmAudio.play();
        bgmStarted = true;
      } catch (_) {
        // 仍可能被浏览器拦截，下一次用户交互时会再次尝试播放。
      }
    }

    function explode(x, y, baseColor) {
      const count = 70 + Math.floor(Math.random() * 50);
      const baseHue = Number((baseColor.match(/\d+/) || [Math.random() * 360])[0]);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const power = Math.random() * 5 + 1.8;
        const vx = Math.cos(angle) * power;
        const vy = Math.sin(angle) * power;
        const hue = (baseHue + (Math.random() * 70 - 35) + 360) % 360;
        const color = `hsl(${hue}, 100%, ${55 + Math.random() * 15}%)`;
        particles.push(new Particle(x, y, vx, vy, color));
      }
    }

    function createShapePoints(text, fontSize) {
      const offscreen = document.createElement("canvas");
      const offCtx = offscreen.getContext("2d");
      const pad = 40;
      offCtx.font = `900 ${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
      const metrics = offCtx.measureText(text);
      const textWidth = Math.ceil(metrics.width);
      const textHeight = Math.ceil(fontSize * 1.3);

      offscreen.width = textWidth + pad * 2;
      offscreen.height = textHeight + pad * 2;
      offCtx.font = `900 ${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
      offCtx.fillStyle = "#fff";
      offCtx.textBaseline = "top";
      offCtx.fillText(text, pad, pad);

      const imageData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height).data;
      const points = [];
      const step = Math.max(2, Math.floor(fontSize / 38));
      for (let yy = 0; yy < offscreen.height; yy += step) {
        for (let xx = 0; xx < offscreen.width; xx += step) {
          const alpha = imageData[(yy * offscreen.width + xx) * 4 + 3];
          if (alpha > 140) {
            points.push({
              x: xx - offscreen.width / 2,
              y: yy - offscreen.height / 2
            });
          }
        }
      }
      return points;
    }

    function explodeShape(x, y, text, baseColor) {
      const baseHue = Number((baseColor.match(/\d+/) || [Math.random() * 360])[0]);
      const fontSize = text.length > 2
        ? Math.min(280, width * 0.28)
        : Math.min(380, width * 0.42);
      const points = createShapePoints(text, fontSize);

      if (!points.length) {
        explode(x, y, baseColor);
        return;
      }

      // 先做一层小爆点，保留”炸开”氛围，再显出文字/图案主体。
      for (let i = 0; i < 100; i++) {
        const angle = Math.random() * Math.PI * 2;
        const power = 1.5 + Math.random() * 3.5;
        const hue = (baseHue + (Math.random() * 50 - 25) + 360) % 360;
        particles.push(
          new Particle(
            x,
            y,
            Math.cos(angle) * power,
            Math.sin(angle) * power,
            `hsl(${hue}, 100%, ${60 + Math.random() * 15}%)`,
            { gravity: 0.03, friction: 0.986, decay: 0.012 + Math.random() * 0.008, size: 1.8 + Math.random() * 2.0 }
          )
        );
      }

      let minX = Infinity;
      let maxX = -Infinity;
      let minY = Infinity;
      let maxY = -Infinity;
      for (let i = 0; i < points.length; i++) {
        const pt = points[i];
        if (pt.x < minX) minX = pt.x;
        if (pt.x > maxX) maxX = pt.x;
        if (pt.y < minY) minY = pt.y;
        if (pt.y > maxY) maxY = pt.y;
      }
      const spanX = Math.max(1, maxX - minX);
      const spanY = Math.max(1, maxY - minY);
      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;
      const targetWidth = text.length > 2
        ? Math.min(width * 0.85, 900)
        : Math.min(width * 0.60, 680);
      const targetHeight = Math.min(height * 0.45, 450);
      const scale = Math.min(targetWidth / spanX, targetHeight / spanY);

      const density = Math.min(1, 1200 / points.length);
      for (let i = 0; i < points.length; i++) {
        if (Math.random() > density) continue;
        const pt = points[i];
        const shapeX = x + (pt.x - centerX) * scale + (Math.random() - 0.5) * 0.9;
        const shapeY = y + (pt.y - centerY) * scale + (Math.random() - 0.5) * 0.9;
        const vx = (Math.random() - 0.5) * 0.25;
        const vy = (Math.random() - 0.5) * 0.25;
        const hue = (baseHue + (Math.random() * 40 - 20) + 360) % 360;
        const color = `hsl(${hue}, 100%, ${58 + Math.random() * 16}%)`;
        particles.push(
          new Particle(shapeX, shapeY, vx, vy, color, {
            gravity: 0.002,
            friction: 0.992,
            decay: 0.0025 + Math.random() * 0.0022,
            size: 2.8 + Math.random() * 2.5
          })
        );
      }
    }

    function launch(x, y, payload = {}) {
      rockets.push(new Rocket(x, y, payload));
    }

    let autoTimer = 0;
    function animate() {
      requestAnimationFrame(animate);

      // 留一点拖影，模拟夜空中的烟雾感。
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = "#02040a";
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      for (let i = rockets.length - 1; i >= 0; i--) {
        const r = rockets[i];
        r.update();
        if (r.done) rockets.splice(i, 1);
        else r.draw();
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        if (p.life <= 0) particles.splice(i, 1);
        else p.draw();
      }

      ctx.restore();

      autoTimer++;
      if (autoTimer > 20 + Math.random() * 18) {
        autoTimer = 0;
        launch(
          Math.random() * width * 0.9 + width * 0.05,
          Math.random() * height * 0.5 + height * 0.08
        );
      }
    }

    function pointerLaunch(event) {
      const p = event.touches ? event.touches[0] : event;
      startBgm();
      const text = clickShapes[clickShapeIndex % clickShapes.length];
      clickShapeIndex++;
      launch(p.clientX, p.clientY, { type: "shape", text });
    }

    window.addEventListener("resize", resize);
    canvas.addEventListener("click", pointerLaunch);
    canvas.addEventListener("mousemove", (e) => {
      if (e.buttons === 1) pointerLaunch(e);
    });
    canvas.addEventListener(
      "touchmove",
      (e) => {
        pointerLaunch(e);
      },
      { passive: true }
    );

    resize();
    for (let i = 0; i < 3; i++) {
      launch(
        Math.random() * width * 0.9 + width * 0.05,
        Math.random() * height * 0.5 + height * 0.08
      );
    }
    animate();
  </script>
</body>
</html>
